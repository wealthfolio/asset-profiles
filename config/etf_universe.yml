  # ---- Non-US (deferred) ----------------------------------------------
  #
  # UCITS (Ireland-domiciled, traded on LSE/Xetra) and TSX-listed funds
  # were removed from the universe in 2026-05 because etf-scraper 0.1.2
  # keys off US ticker symbols and returns "No listings found for
  # ticker X" for foreign tickers like CSPX/IWDA/VWCE/XIC.TO/etc.
  #
  # To re-enable, we'd need either:
  #   (a) a foreign-domicile scraper (issuer-direct CSV per ticker), or
  #   (b) a Morningstar / Refinitiv data feed.
  #
  # Tickers parked for reintroduction:
  #   UCITS: CSPX, IWDA, EIMI, VWRL, VWCE, AGGH, SXR8, VHYL
  #   TSX:   XIC.TO, VFV.TO, ZSP.TO (BMO), XEQT.TO, VEQT.TO
