# ETF universe — funds we track. Edit-via-PR welcomed (see CONTRIBUTING.md).
#
# For US-domiciled funds, set `cik` so EDGAR lookup is deterministic.
# For non-US (UCITS, TSX), omit `cik` and the build falls back to the
# issuer scraper using the `issuer` hint.
#
# `issuer` is one of: iShares, Vanguard, SSGA, Invesco, ARK, ProShares,
# Schwab, FirstTrust, JPMorgan, GlobalX, WisdomTree.

